services:
  - type: web
    name: weather-api-widget
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WEATHER_CACHE_TTL
        value: 600
      - key: WEATHER_REQUEST_TIMEOUT
        value: 8
